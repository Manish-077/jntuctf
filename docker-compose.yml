services:
  web:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - bec_data:/app/data
    environment:
      - STREAMLIT_SERVER_HEADLESS=true

  api:
    build: .
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - bec_data:/app/data
    environment:
      - PYTHONPATH=/app

volumes:
  bec_data:
